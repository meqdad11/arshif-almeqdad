name: Build EXE
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        pip install pyinstaller customtkinter pymupdf easyocr pillow numpy
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --icon=icon.ico --add-data "logo_final.png;." --collect-all customtkinter --collect-all easyocr --collect-all torch --collect-all torchvision --copy-metadata torch --copy-metadata torchvision --copy-metadata easyocr --paths=. main.py
        mv dist/main.exe dist/voucher_processor.exe
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/voucher_processor.exe
        tag_name: v1.4.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
