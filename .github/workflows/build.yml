name: Build EXE
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        pip install pyinstaller customtkinter pymupdf easyocr pillow numpy
    - name: Create torch hook
      run: |
        echo "from PyInstaller.utils.hooks import collect_all" > hook-torch.py
        echo "datas, binaries, hiddenimports = collect_all('torch')" >> hook-torch.py
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --icon=icon.ico --add-data "logo_final.png;." --collect-all customtkinter --collect-all easyocr --additional-hooks-dir=. voucher_processor.py
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/voucher_processor.exe
        tag_name: v1.3.3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
